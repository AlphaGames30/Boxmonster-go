<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BoxMonster GO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

html,body{
margin:0;
height:100%;
font-family:Arial;
background:black;
}

#map{
height:100%;
}

#menuButton{
position:absolute;
top:10px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
z-index:1000;
}

#menu{
position:absolute;
top:60px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
display:none;
z-index:1000;
}

#playerHUD{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:10px;
z-index:1000;
}

button{
padding:10px;
margin:5px;
}

.captureStopIcon{
border-radius:50%;
border:4px solid cyan;
}

#captureScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
z-index:2000;
}

#monster3D{
width:160px;
height:160px;
border-radius:20px;
margin-bottom:30px;
}

#indexScreen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
z-index:3000;
}

#indexGrid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:10px;
padding:20px;
}

.indexMonster{
width:50px;
height:50px;
border-radius:10px;
}

</style>

</head>

<body>

<div id="map"></div>

<div id="playerHUD">

<b>Niveau <span id="level">1</span></b><br>
XP : <span id="xp">0</span><br>

Boîtes :
<span id="basicBox">10</span> 🟢
<span id="superBox">5</span> 🔵
<span id="ultraBox">2</span> 🟣

</div>

<div id="menuButton" onclick="toggleMenu()">MENU</div>

<div id="menu">

<button onclick="openInventory()">Inventaire</button>
<button onclick="openIndex()">Index</button>
<button onclick="createStop()">Créer CaptureStop</button>
<button onclick="toggleMenu()">Fermer</button>

</div>

<div id="captureScreen">

<div id="monster3D"></div>

<div>

<button onclick="throwBox('basic')">Boîte 🟢</button>
<button onclick="throwBox('super')">Super 🔵</button>
<button onclick="throwBox('ultra')">Ultra 🟣</button>

</div>

<button onclick="closeCapture()">Fuir</button>

</div>

<div id="indexScreen">

<button onclick="closeIndex()">Fermer</button>

<div id="indexGrid"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const firebaseConfig = {
apiKey:"APIKEY",
authDomain:"PROJECT.firebaseapp.com",
projectId:"PROJECT"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

let map
let player
let playerLat
let playerLon

let xp=0
let level=1

let basicBox=10
let superBox=5
let ultraBox=2

let inventory=[]
let creatures=[]
let currentMonster=null

let placingStop=false
let stopName=""
let stopImage=""

const MAX_DISTANCE=50
const COOLDOWN=300000

for(let i=1;i<=120;i++){

let rarity="common"

if(i>80) rarity="rare"
if(i>105) rarity="epic"
if(i>115) rarity="legend"

creatures.push({
id:i,
name:"Monster "+i,
rarity:rarity,
color:"hsl("+Math.random()*360+",70%,50%)"
})

}

function toggleMenu(){

let m=document.getElementById("menu")

m.style.display=m.style.display=="block"?"none":"block"

}

function updateHUD(){

document.getElementById("xp").innerText=xp
document.getElementById("level").innerText=level

document.getElementById("basicBox").innerText=basicBox
document.getElementById("superBox").innerText=superBox
document.getElementById("ultraBox").innerText=ultraBox

}

function addXP(a){

xp+=a

let need=level*100

if(xp>=need){

xp-=need
level++

alert("Niveau "+level)

}

updateHUD()

}

function openInventory(){

let text="Inventaire\n\n"

inventory.forEach(c=>{
text+=c.name+" ("+c.rarity+")\n"
})

alert(text)

}

function openIndex(){

let grid=document.getElementById("indexGrid")

grid.innerHTML=""

creatures.forEach(c=>{

let owned=inventory.find(i=>i.id==c.id)

let div=document.createElement("div")

div.className="indexMonster"

if(owned){
div.style.background=c.color
}else{
div.style.background="black"
div.style.border="1px solid white"
}

grid.appendChild(div)

})

document.getElementById("indexScreen").style.display="flex"

}

function closeIndex(){

document.getElementById("indexScreen").style.display="none"

}

function spawnCreatures(lat,lon){

for(let i=0;i<4;i++){

let c=creatures[Math.floor(Math.random()*creatures.length)]

let marker=L.marker([
lat+(Math.random()-0.5)/300,
lon+(Math.random()-0.5)/300
]).addTo(map)

marker.creature=c

marker.on("click",()=>startCapture(c,marker))

}

}

function startCapture(creature,marker){

currentMonster=creature

map.removeLayer(marker)

let div=document.getElementById("monster3D")

div.style.background=creature.color

document.getElementById("captureScreen").style.display="flex"

}

function throwBox(type){

let chance=0.4

if(type=="basic"){
if(basicBox<=0){alert("Plus de boîtes");return}
basicBox--
chance=0.4
}

if(type=="super"){
if(superBox<=0){alert("Plus de boîtes");return}
superBox--
chance=0.65
}

if(type=="ultra"){
if(ultraBox<=0){alert("Plus de boîtes");return}
ultraBox--
chance=0.9
}

if(Math.random()<chance){

alert("Capture réussie")

inventory.push(currentMonster)

addXP(20)

closeCapture()

}else{

alert("Raté")

}

updateHUD()

}

function closeCapture(){

document.getElementById("captureScreen").style.display="none"

}

function createStop(){

stopName=prompt("Nom CaptureStop (32 max)")

if(!stopName)return

let input=document.createElement("input")
input.type="file"

input.onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=ev=>{

stopImage=ev.target.result
placingStop=true

alert("Clique sur la carte")

}

reader.readAsDataURL(file)

}

input.click()

}

function startGame(lat,lon){

map=L.map("map").setView([lat,lon],17)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map)

player=L.circle([lat,lon],{radius:10,color:"blue"}).addTo(map)

spawnCreatures(lat,lon)

loadStops()

map.on("click",function(e){

if(!placingStop)return

placingStop=false

db.collection("captureStops").add({

name:stopName,
image:stopImage,
lat:e.latlng.lat,
lon:e.latlng.lng,
status:"pending",
date:Date.now()

})

alert("CaptureStop envoyé aux modérateurs")

})

}

function loadStops(){

db.collection("captureStops")
.where("status","==","approved")
.get()
.then(snapshot=>{

snapshot.forEach(doc=>{

let s=doc.data()

let icon=L.icon({
iconUrl:s.image,
iconSize:[50,50],
className:"captureStopIcon"
})

L.marker([s.lat,s.lon],{icon}).addTo(map)

})

})

}

navigator.geolocation.watchPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

playerLat=lat
playerLon=lon

if(!map){

startGame(lat,lon)

}else{

player.setLatLng([lat,lon])
map.setView([lat,lon])

}

})

updateHUD()

</script>

</body>
</html>
